<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Institucional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .glass-card {
            background: white;
            border: 1px solid #e2e8f0;
            transition: all 0.3s ease;
        }
        .glass-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border-color: #6366f1;
        }
        body { background-color: #f8fafc; }
    </style>
</head>
<body class="min-h-screen text-slate-800">

    <nav class="bg-indigo-700 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2 font-bold text-lg">
                <i class="fas fa-university"></i>
                <span>Panel Directivo</span>
            </div>
            <div class="flex gap-2">
                <button id="configBtn" class="p-2 hover:bg-indigo-600 rounded-lg"><i class="fas fa-cog"></i></button>
                <button id="syncBtn" class="bg-indigo-800 px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2">
                    <i class="fas fa-sync-alt" id="syncIcon"></i> Sincronizar
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-6">
        <div id="errorAlert" class="hidden mb-6 bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative">
            <strong class="font-bold">Error de conexión:</strong>
            <span class="block sm:inline text-sm"> No se pudo leer la planilla. Intenta de nuevo o verifica el enlace CSV.</span>
        </div>

        <div class="mb-8 flex flex-col md:flex-row gap-4">
            <input type="text" id="searchInput" placeholder="Buscar por nombre..." class="flex-1 p-3 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-400">
            <select id="categoryFilter" class="p-3 rounded-xl border border-slate-200 outline-none bg-white font-medium">
                <option value="all">Todas las categorías</option>
            </select>
        </div>

        <div id="favoritesSection" class="mb-10 hidden">
            <h2 class="text-lg font-bold mb-4 text-indigo-900 flex items-center gap-2"><i class="fas fa-star text-yellow-500"></i> Favoritos</h2>
            <div id="favoritesGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4"></div>
        </div>

        <div id="mainSection">
            <h2 class="text-lg font-bold mb-4 text-slate-600">Archivos</h2>
            <div id="linksGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                <p id="loadingMsg" class="col-span-full text-center py-10 text-slate-400 italic">Esperando configuración...</p>
            </div>
        </div>
    </main>

    <div id="configModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden items-center justify-center z-[60] p-4">
        <div class="bg-white rounded-2xl max-w-lg w-full p-6 shadow-2xl">
            <h3 class="text-xl font-bold mb-4 text-indigo-900">Configurar Enlace</h3>
            <p class="text-xs text-slate-500 mb-4 leading-relaxed">
                Pega la URL de <strong>"Publicar en la web"</strong> (debe terminar en <code>output=csv</code>). 
            </p>
            <textarea id="urlInput" class="w-full p-3 border rounded-xl text-xs font-mono mb-4 bg-slate-50" rows="3"></textarea>
            <div class="flex gap-2">
                <button id="saveBtn" class="flex-1 bg-indigo-600 text-white py-3 rounded-xl font-bold hover:bg-indigo-700 transition">Guardar</button>
                <button id="closeBtn" class="px-6 py-3 text-slate-500 font-medium hover:bg-slate-100 rounded-xl transition">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        let DATA_URL = localStorage.getItem('school_csv_url_final') || '';
        let allData = [];

        const icons = {
            doc: 'fa-file-alt text-blue-500',
            sheet: 'fa-file-excel text-green-600',
            form: 'fa-check-square text-purple-500',
            pdf: 'fa-file-pdf text-red-500',
            slides: 'fa-file-powerpoint text-orange-500',
            default: 'fa-link text-slate-400'
        };

        function processCSV(text) {
            const rows = text.split(/\r?\n/).map(row => {
                const matches = row.match(/(".*?"|[^",\r]+)(?=\s*,|\s*$|\r)/g);
                return matches ? matches.map(m => m.replace(/^"|"$/g, '').trim()) : [];
            });
            
            if (rows.length < 2) return [];
            const headers = rows[0].map(h => h.toLowerCase().trim());
            
            return rows.slice(1).map(row => {
                let obj = {};
                headers.forEach((header, i) => {
                    obj[header] = row[i] || '';
                });
                return obj;
            }).filter(item => item.nombre && item.link);
        }

        async function loadData() {
            if (!DATA_URL) { toggleModal(true); return; }
            
            const syncIcon = document.getElementById('syncIcon');
            syncIcon.classList.add('fa-spin');
            document.getElementById('errorAlert').classList.add('hidden');
            document.getElementById('loadingMsg').textContent = "Cargando datos...";

            try {
                // Usamos una URL de proxy para evitar problemas de CORS en algunos navegadores
                const proxyUrl = 'https://api.allorigins.win/get?url=' + encodeURIComponent(DATA_URL + '&cache=' + Date.now());
                const response = await fetch(proxyUrl);
                
                if (!response.ok) throw new Error();
                
                const json = await response.json();
                allData = processCSV(json.contents);
                
                if (allData.length === 0) {
                    document.getElementById('loadingMsg').textContent = "No hay datos en la planilla o las columnas están mal nombradas.";
                } else {
                    render();
                    updateFilters();
                }
            } catch (err) {
                document.getElementById('errorAlert').classList.remove('hidden');
                document.getElementById('loadingMsg').textContent = "Error al conectar.";
            } finally {
                syncIcon.classList.remove('fa-spin');
            }
        }

        function render(search = '', cat = 'all') {
            const grid = document.getElementById('linksGrid');
            const favGrid = document.getElementById('favoritesGrid');
            const favSection = document.getElementById('favoritesSection');
            
            grid.innerHTML = '';
            favGrid.innerHTML = '';

            const filtered = allData.filter(i => {
                const matchName = i.nombre.toLowerCase().includes(search.toLowerCase());
                const matchCat = cat === 'all' || i.categoria === cat;
                return matchName && matchCat;
            });

            const favs = filtered.filter(i => i.favorito?.toLowerCase() === 'si');
            const norms = filtered.filter(i => i.favorito?.toLowerCase() !== 'si');

            if (favs.length > 0) {
                favSection.classList.remove('hidden');
                favs.forEach(i => favGrid.appendChild(createCard(i)));
            } else {
                favSection.classList.add('hidden');
            }

            norms.forEach(i => grid.appendChild(createCard(i)));
            
            if (filtered.length === 0) {
                grid.innerHTML = '<p class="col-span-full text-center py-10 text-slate-400">Sin resultados.</p>';
            }
        }

        function createCard(item) {
            const div = document.createElement('a');
            div.href = item.link;
            div.target = "_blank";
            div.className = "glass-card p-4 rounded-xl flex items-center gap-4 hover:shadow-md transition-all";
            const icon = icons[item.tipo?.toLowerCase()] || icons.default;
            div.innerHTML = `
                <div class="text-2xl w-10 h-10 flex items-center justify-center flex-shrink-0">
                    <i class="fas ${icon}"></i>
                </div>
                <div class="overflow-hidden">
                    <h3 class="font-bold text-sm truncate text-slate-800">${item.nombre}</h3>
                    <p class="text-[10px] text-slate-400 uppercase font-bold tracking-wider">${item.categoria || 'General'}</p>
                </div>
            `;
            return div;
        }

        function updateFilters() {
            const sel = document.getElementById('categoryFilter');
            const cats = [...new Set(allData.map(i => i.categoria).filter(Boolean))];
            sel.innerHTML = '<option value="all">Todas las categorías</option>';
            cats.sort().forEach(c => {
                const opt = document.createElement('option');
                opt.value = c; opt.textContent = c;
                sel.appendChild(opt);
            });
        }

        function toggleModal(show) {
            document.getElementById('configModal').classList.toggle('hidden', !show);
            document.getElementById('configModal').classList.toggle('flex', show);
        }

        document.getElementById('configBtn').onclick = () => toggleModal(true);
        document.getElementById('closeBtn').onclick = () => toggleModal(false);
        document.getElementById('syncBtn').onclick = loadData;
        document.getElementById('saveBtn').onclick = () => {
            const val = document.getElementById('urlInput').value.trim();
            if (val) {
                DATA_URL = val;
                localStorage.setItem('school_csv_url_final', val);
                toggleModal(false);
                loadData();
            }
        };

        document.getElementById('searchInput').oninput = (e) => render(e.target.value, document.getElementById('categoryFilter').value);
        document.getElementById('categoryFilter').onchange = (e) => render(document.getElementById('searchInput').value, e.target.value);

        loadData();
    </script>
</body>
</html>
